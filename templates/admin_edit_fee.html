<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Fee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='Dashboardstyle.css') }}">
</head>
<body>

    <div class="dashboard-header">
        Edit Fee Record
    </div>

    <div class="dashboard-container">
        <div class="card" style="width: 100%; padding: 24px;">
            <form method="post" style="display: grid; gap: 18px;">
                <div>
                    <label for="student_id">Student</label>
                    <select id="student_id" name="student_id" required>
                        {% for student in students %}
                        <option value="{{ student.id }}" {% if student.id == fee.student_id %}selected{% endif %}>{{ student.name }} ({{ student.reg_id }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="semester">Semester</label>
                    <input type="text" id="semester" name="semester" value="{{ fee.semester }}" required>
                </div>
                <div>
                    <label for="amount_due">Amount Due</label>
                    <input type="number" id="amount_due" name="amount_due" value="{{ fee.amount_due }}" step="0.01" required>
                </div>
                <div>
                    <label for="amount_paid">Amount Paid</label>
                    <input type="number" id="amount_paid" name="amount_paid" value="{{ fee.amount_paid }}" step="0.01" required>
                </div>
                <div>
                    <label for="due_date">Due Date</label>
                    <input type="date" id="due_date" name="due_date" value="{{ fee.due_date }}" required>
                </div>
                <div>
                    <label for="status">Status</label>
                    <select id="status" name="status" required>
                        <option value="Pending" {% if fee.status == 'Pending' %}selected{% endif %}>Pending</option>
                        <option value="Paid" {% if fee.status == 'Paid' %}selected{% endif %}>Paid</option>
                        <option value="Overdue" {% if fee.status == 'Overdue' %}selected{% endif %}>Overdue</option>
                    </select>
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button type="submit" class="badge" style="background-color:#1f4fd8;">Update Fee</button>
                    <a href="{{ url_for('view_fees') }}" class="badge" style="background-color:#757575;">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <div class="dashboard-footer">
        Copyright Agriculture University of Faisalabad | Admin - Edit Fee
    </div>

</body>
</html>
