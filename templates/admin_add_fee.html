<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Fee</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='Dashboardstyle.css') }}">
</head>
<body>

    <div class="dashboard-header">
        Add Fee Record
    </div>

    <div class="dashboard-container">
        <div class="card" style="width: 100%; padding: 24px;">
            <form method="post" style="display: grid; gap: 18px;">
                <div>
                    <label for="student_id">Student</label>
                    <select id="student_id" name="student_id" required>
                        <option value="">Select student</option>
                        {% for student in students %}
                        <option value="{{ student.id }}">{{ student.name }} ({{ student.reg_id }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="semester">Semester</label>
                    <input type="text" id="semester" name="semester" required>
                </div>
                <div>
                    <label for="amount_due">Amount Due</label>
                    <input type="number" id="amount_due" name="amount_due" step="0.01" required>
                </div>
                <div>
                    <label for="amount_paid">Amount Paid</label>
                    <input type="number" id="amount_paid" name="amount_paid" step="0.01" required>
                </div>
                <div>
                    <label for="due_date">Due Date</label>
                    <input type="date" id="due_date" name="due_date" required>
                </div>
                <div>
                    <label for="status">Status</label>
                    <select id="status" name="status" required>
                        <option value="Pending">Pending</option>
                        <option value="Paid">Paid</option>
                        <option value="Overdue">Overdue</option>
                    </select>
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button type="submit" class="badge" style="background-color:#1f4fd8;">Save Fee</button>
                    <a href="{{ url_for('view_fees') }}" class="badge" style="background-color:#757575;">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <div class="dashboard-footer">
        Copyright Agriculture University of Faisalabad | Admin - Add Fee
    </div>

</body>
</html>
