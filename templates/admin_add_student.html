<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Student</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='Dashboardstyle.css') }}">
</head>
<body>

    <div class="dashboard-header">
        Create Student Account
    </div>

    <div class="dashboard-container">

        <div class="card" style="max-width: 700px; margin: auto;">
            <h2>Student Profile Information</h2>
            <p>Required fields are used to create the student profile and login credentials automatically.</p>
            <form action="{{ url_for('add_student') }}" method="post">
                <ul>
                    <li><input type="text" name="name" placeholder="Full Name" required></li>
                    <li>
                        <select name="program" required>
                            <option value="">Select Program</option>
                            <option value="UG">UG</option>
                            <option value="GS">GS</option>
                        </select>
                    </li>
                    <li>
                        <select name="degree_level" required>
                            <option value="">Select Degree Level</option>
                            <option value="BS">BS</option>
                            <option value="MS">MS</option>
                            <option value="PhD">PhD</option>
                        </select>
                    </li>
                    <li><input type="text" name="degree_type" placeholder="Degree Type (e.g. Software Engineering)" required></li>
                    <li>
                        <label for="class_id">Assign Class</label>
                        <select id="class_id" name="class_id" style="width:100%; padding: 10px; border-radius: 8px; border: 1px solid #c8c8c8;">
                            <option value="">No class assigned</option>
                            {% for class_row in classes %}
                                <option value="{{ class_row.id }}">{{ class_row.name }} - {{ class_row.semester }} {{ class_row.year }}</option>
                            {% endfor %}
                        </select>
                    </li>
                    <li><input type="text" name="department" placeholder="Department" required></li>
                    <li>
                        <select name="fee_status" required>
                            <option value="">Select Fee Status</option>
                            <option value="Paid">Paid</option>
                            <option value="Unpaid">Unpaid</option>
                            <option value="Partial">Partial</option>
                        </select>
                    </li>
                    <li><input type="text" name="father_name" placeholder="Father Name"></li>
                    <li><button type="submit" class="badge" style="background-color:#1f4fd8;">Create Student</button></li>
                </ul>
            </form>
        </div>

    </div>

    <div class="dashboard-footer">
        Copyright Agriculture University of Faisalabad | Add Student
    </div>

</body>
</html>
