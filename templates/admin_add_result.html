<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Add Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='Dashboardstyle.css') }}">
</head>
<body>

    <div class="dashboard-header">
        Add Result
    </div>

    <div class="dashboard-container">
        <div class="card" style="width: 100%; padding: 24px;">
            <form method="post" style="display: grid; gap: 18px;">
                <div>
                    <label for="student_id">Student</label>
                    <select id="student_id" name="student_id" required>
                        <option value="">Select student</option>
                        {% for student in students %}
                        <option value="{{ student.id }}">{{ student.name }} ({{ student.reg_id }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="course_id">Course</label>
                    <select id="course_id" name="course_id" required>
                        <option value="">Select course</option>
                        {% for course in courses %}
                        <option value="{{ course.id }}">{{ course.name }} ({{ course.code }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="grade">Grade</label>
                    <input type="text" id="grade" name="grade" required>
                </div>
                <div>
                    <label for="marks_obtained">Marks Obtained</label>
                    <input type="number" id="marks_obtained" name="marks_obtained" required>
                </div>
                <div>
                    <label for="total_marks">Total Marks</label>
                    <input type="number" id="total_marks" name="total_marks" required>
                </div>
                <div>
                    <label for="term">Term</label>
                    <input type="text" id="term" name="term" required>
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button type="submit" class="badge" style="background-color:#1f4fd8;">Save Result</button>
                    <a href="{{ url_for('view_results') }}" class="badge" style="background-color:#757575;">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <div class="dashboard-footer">
        Copyright Agriculture University of Faisalabad | Admin - Add Result
    </div>

</body>
</html>
