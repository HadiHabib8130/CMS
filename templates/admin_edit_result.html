<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Result</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='Dashboardstyle.css') }}">
</head>
<body>

    <div class="dashboard-header">
        Edit Result
    </div>

    <div class="dashboard-container">
        <div class="card" style="width: 100%; padding: 24px;">
            <form method="post" style="display: grid; gap: 18px;">
                <div>
                    <label for="student_id">Student</label>
                    <select id="student_id" name="student_id" required>
                        {% for student in students %}
                        <option value="{{ student.id }}" {% if student.id == result.student_id %}selected{% endif %}>{{ student.name }} ({{ student.reg_id }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="course_id">Course</label>
                    <select id="course_id" name="course_id" required>
                        {% for course in courses %}
                        <option value="{{ course.id }}" {% if course.id == result.course_id %}selected{% endif %}>{{ course.name }} ({{ course.code }})</option>
                        {% endfor %}
                    </select>
                </div>
                <div>
                    <label for="grade">Grade</label>
                    <input type="text" id="grade" name="grade" value="{{ result.grade }}" required>
                </div>
                <div>
                    <label for="marks_obtained">Marks Obtained</label>
                    <input type="number" id="marks_obtained" name="marks_obtained" value="{{ result.marks_obtained }}" required>
                </div>
                <div>
                    <label for="total_marks">Total Marks</label>
                    <input type="number" id="total_marks" name="total_marks" value="{{ result.total_marks }}" required>
                </div>
                <div>
                    <label for="term">Term</label>
                    <input type="text" id="term" name="term" value="{{ result.term }}" required>
                </div>
                <div style="display: flex; gap: 12px; flex-wrap: wrap;">
                    <button type="submit" class="badge" style="background-color:#1f4fd8;">Update Result</button>
                    <a href="{{ url_for('view_results') }}" class="badge" style="background-color:#757575;">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <div class="dashboard-footer">
        Copyright Agriculture University of Faisalabad | Admin - Edit Result
    </div>

</body>
</html>
